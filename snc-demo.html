:root {
  --bg: #F5F5F7;
  --card: #FFFFFF;
  --border: rgba(0,0,0,0.07);
  --border-light: rgba(0,0,0,0.04);
  --text: #1D1D1F;
  --text-secondary: #424245;
  --text-dim: #6E6E73;
  --text-muted: #86868B;
  --brand: #E63329;
  --brand-light: rgba(230,51,41,0.08);
  --brand-mid: rgba(230,51,41,0.15);
  --green: #10B981;
  --green-bg: rgba(16,185,129,0.08);
  --amber: #F59E0B;
  --amber-bg: rgba(245,158,11,0.08);
  --red: #EF4444;
  --red-bg: rgba(239,68,68,0.08);
  --blue: #3B82F6;
  --blue-bg: rgba(59,130,246,0.08);
  --purple: #8B5CF6;
  --purple-bg: rgba(139,92,246,0.08);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.06), 0 4px 6px -4px rgba(0,0,0,0.04);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:var(--font); background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; overflow-x:hidden; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.12); border-radius:10px; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }

.header {
  background:rgba(255,255,255,0.8);
  border-bottom:1px solid var(--border);
  padding:0 40px; height:60px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
  backdrop-filter:blur(20px);
}
.logo { display:flex; align-items:center; gap:10px; }
.logo-mark { width:28px; height:28px; background:var(--brand); border-radius:8px; display:flex; align-items:center; justify-content:center; }
.logo-mark svg { width:16px; height:16px; fill:white; }
.logo-name { font-size:15px; font-weight:700; letter-spacing:-0.3px; }
.logo-div { width:1px; height:18px; background:var(--border); margin:0 12px; }
.logo-product { font-size:13px; font-weight:600; color:var(--brand); }
.header-right { display:flex; align-items:center; gap:10px; }
.nav-tabs { display:flex; background:#F3F4F6; border-radius:10px; padding:3px; gap:2px; }
.nav-tab { padding:6px 16px; border-radius:8px; border:none; background:transparent; color:var(--text-muted); cursor:pointer; font-size:13px; font-weight:500; font-family:var(--font); transition:all 0.2s; white-space:nowrap; }
.nav-tab.active { background:#fff; color:var(--text); box-shadow:var(--shadow-sm); font-weight:600; }
.indicative-badge { display:flex; align-items:center; gap:5px; padding:5px 12px; border-radius:20px; background:var(--amber-bg); font-size:11px; font-weight:600; color:var(--amber); text-transform:uppercase; letter-spacing:0.5px; }

.page { padding:28px 40px; max-width:1320px; margin:0 auto; animation:fadeIn 0.3s ease; }

/* COVER */
.cover-hero { display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center; margin-bottom:48px; }
.cover-eyebrow { font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--brand); margin-bottom:16px; }
.cover-title { font-size:44px; font-weight:800; letter-spacing:-1.5px; line-height:1.08; margin-bottom:16px; }
.cover-title span { color:var(--brand); }
.cover-sub { font-size:16px; color:var(--text-dim); line-height:1.65; margin-bottom:32px; }
.cover-stats { display:flex; gap:32px; }
.stat-val { font-size:30px; font-weight:800; letter-spacing:-1px; color:var(--brand); }
.stat-lbl { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:3px; font-weight:500; }
.cover-visual { width:100%; aspect-ratio:1.3; background:linear-gradient(135deg,#FEF2F2,#FFF5F5,#FEF2F2); border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; box-shadow:var(--shadow-lg); }
.cover-features { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.cover-feature { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow-sm); transition:all 0.3s; }
.cover-feature:hover { box-shadow:var(--shadow-lg); transform:translateY(-3px); }
.feature-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; margin-bottom:14px; }
.feature-title { font-size:14px; font-weight:700; margin-bottom:6px; }
.feature-body { font-size:13px; color:var(--text-dim); line-height:1.6; }

/* INBOX / PIPELINE */
.two-col { display:grid; grid-template-columns:340px 1fr; gap:20px; height:calc(100vh - 140px); }
.panel { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; display:flex; flex-direction:column; box-shadow:var(--shadow-sm); }
.panel-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.panel-title { font-size:13px; font-weight:700; color:var(--text); }
.panel-body { flex:1; overflow-y:auto; }

.inbox-item { padding:14px 18px; border-bottom:1px solid var(--border-light); cursor:pointer; transition:background 0.15s; display:flex; gap:12px; align-items:flex-start; }
.inbox-item:hover { background:#FAFAFA; }
.inbox-item.active { background:var(--brand-light); }
.inbox-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.inbox-meta { flex:1; min-width:0; }
.inbox-from { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.inbox-subject { font-size:12px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.inbox-time { font-size:11px; color:var(--text-muted); margin-top:2px; }
.inbox-badge { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; padding:2px 7px; border-radius:20px; flex-shrink:0; margin-top:2px; }
.badge-new { background:var(--brand-light); color:var(--brand); }
.badge-review { background:var(--amber-bg); color:var(--amber); }
.badge-done { background:var(--green-bg); color:var(--green); }

/* DOCUMENT DETAIL */
.doc-view { display:flex; flex-direction:column; height:100%; }
.doc-header { padding:20px 24px; border-bottom:1px solid var(--border); flex-shrink:0; }
.doc-title { font-size:16px; font-weight:700; margin-bottom:4px; }
.doc-meta { font-size:12px; color:var(--text-muted); }
.doc-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); flex-shrink:0; padding:0 24px; }
.doc-tab { padding:10px 16px; font-size:13px; font-weight:500; color:var(--text-dim); border-bottom:2px solid transparent; cursor:pointer; transition:all 0.15s; }
.doc-tab.active { color:var(--brand); border-bottom-color:var(--brand); font-weight:600; }
.doc-content { flex:1; overflow-y:auto; padding:24px; }

/* EXTRACTION TABLE */
.extract-table { width:100%; border-collapse:collapse; font-size:13px; }
.extract-table th { padding:10px 14px; text-align:left; font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-muted); border-bottom:1px solid var(--border); background:#FAFAFA; }
.extract-table td { padding:12px 14px; border-bottom:1px solid var(--border-light); vertical-align:middle; }
.extract-table tr:last-child td { border-bottom:none; }
.extract-table tr:hover td { background:#FAFAFA; }
.field-name { font-weight:600; color:var(--text); }
.field-val { color:var(--text-secondary); font-family:'Courier New', monospace; font-size:12px; }

.source-link { font-size:11px; color:var(--blue); cursor:pointer; text-decoration:underline; }

.flag-card.green .flag-title { color:var(--green); }
.flag-body { font-size:13px; color:var(--text-secondary); line-height:1.6; }

/* AI CHAT */
.chat-wrap { display:flex; flex-direction:column; height:calc(100vh - 140px); gap:20px; }

.chat-name { font-size:14px; font-weight:700; }
.chat-status { font-size:12px; color:var(--green); font-weight:500; display:flex; align-items:center; gap:5px; }

.messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
.msg { display:flex; gap:10px; align-items:flex-start; max-width:80%; }
.msg.user { align-self:flex-end; flex-direction:row-reverse; }

.msg.user .msg-av { background:#E5E7EB; color:var(--text-secondary); }

.msg.ai .msg-bubble { background:#F3F4F6; color:var(--text); border-bottom-left-radius:3px; }
.msg.user .msg-bubble { background:var(--brand); color:white; border-bottom-right-radius:3px; }

.sources { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }

.chat-input:focus { border-color:var(--brand); }

.send-btn:hover { background:#c42b22; }

.pipeline-col { flex:0 0 240px; }
.pipeline-col-header { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-muted); margin-bottom:10px; padding:0 4px; display:flex; align-items:center; justify-content:space-between; }
.pipeline-count { background:#E5E7EB; color:var(--text-secondary); padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.pipeline-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; margin-bottom:8px; box-shadow:var(--shadow-sm); cursor:pointer; transition:all 0.2s; }
.pipeline-card:hover { box-shadow:var(--shadow-md); transform:translateY(-1px); }
.pipeline-card-company { font-size:13px; font-weight:700; margin-bottom:3px; }
.pipeline-card-desc { font-size:12px; color:var(--text-dim); margin-bottom:10px; line-height:1.5; }
.pipeline-card-meta { display:flex; justify-content:space-between; align-items:center; }
.pipeline-flag { font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; }
.flag-critical { background:var(--red-bg); color:var(--red); }
.flag-review { background:var(--amber-bg); color:var(--amber); }
.flag-clear { background:var(--green-bg); color:var(--green); }
.pipeline-age { font-size:11px; color:var(--text-muted); }

.pill { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.pill-brand { background:var(--brand-light); color:var(--brand); }
.pill-green { background:var(--green-bg); color:var(--green); }

.pill-red { background:var(--red-bg); color:var(--red); }

.flow { display:flex; align-items:center; gap:0; overflow-x:auto; padding:24px 0; }

.flow-icon { font-size:20px; margin-bottom:6px; }

.flow-sub { font-size:10px; color:var(--text-muted); margin-top:3px; line-height:1.3; }
.flow-arrow { font-size:18px; color:var(--text-muted); flex-shrink:0; margin:0 4px; }

</style>

function DocViewer({ snippet, field, value, onClose }) {
  if (!snippet) return null;
  return (
    <div style={{
      position:'fixed', top:0, right:0, bottom:0, width:480,
      background:'white', boxShadow:'-4px 0 24px rgba(0,0,0,0.12)',
      zIndex:1000, display:'flex', flexDirection:'column',
      animation:'slideInRight 0.22s ease'
    }}>
      <style>{`@keyframes slideInRight { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }`}</style>

      {/* Header */}
      <div style={{padding:'16px 20px', borderBottom:'1px solid var(--border)', flexShrink:0, background:'var(--bg)'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
          <div>
            <div style={{fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.07em', color:'var(--text-muted)', marginBottom:4}}>Source Document</div>
            <div style={{fontSize:14, fontWeight:700, color:'var(--text)'}}>Page {snippet.page} — {snippet.section}</div>
            <div style={{fontSize:12, color:'var(--text-muted)', marginTop:2}}>Extracted: <span style={{fontWeight:600, color:'var(--green)'}}>{field}</span> → <span style={{fontFamily:"'Courier New',monospace", color:'var(--text)'}}>{value}</span></div>
          </div>
          <button onClick={onClose} style={{
            width:28, height:28, borderRadius:'50%', border:'1px solid var(--border)',
            background:'white', cursor:'pointer', fontSize:14, color:'var(--text-muted)',
            display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0
          }}>✕</button>
        </div>
        <div style={{marginTop:10, display:'flex', gap:8, alignItems:'center', fontSize:12}}>
          <span style={{padding:'2px 8px', background:'rgba(255,215,0,0.3)', border:'1px solid rgba(200,160,0,0.3)', borderRadius:4, fontWeight:600, color:'#856404'}}>■ Highlighted = extracted value</span>
          <span style={{color:'var(--text-muted)'}}>Click anywhere to dismiss</span>
        </div>
      </div>

      {/* Document body */}
      <div style={{flex:1, overflowY:'auto', padding:'24px 28px', background:'#FAFAFA'}}>
        <div style={{
          background:'white', border:'1px solid var(--border)',
          borderRadius:8, padding:'28px 32px',
          boxShadow:'0 1px 4px rgba(0,0,0,0.06)',
          fontFamily:"'Times New Roman', Georgia, serif",
          fontSize:14, lineHeight:1.8, color:'#1a1a1a'
        }}>
          {snippet.lines.map((line, i) => {
            if (line.text === ' ') return <div key={i} style={{height:8}}/>;
            return (
              <div key={i} style={{
                marginBottom: line.bold && !line.highlight ? 2 : 1,
                fontFamily: line.mono ? "'Courier New', monospace" : "'Times New Roman', Georgia, serif",
                fontSize: line.size==='lg' ? 16 : line.mono ? 12 : 14,
                fontWeight: line.bold ? 700 : 400,
                color: line.muted ? '#888' : line.warn ? '#92400e' : '#1a1a1a',
                background: line.highlight ? 'rgba(255,230,0,0.45)' : line.warn ? 'rgba(245,158,11,0.1)' : 'transparent',
                padding: line.highlight ? '1px 3px' : line.warn ? '6px 10px' : '0',
                borderRadius: line.highlight ? 3 : line.warn ? 4 : 0,
                borderLeft: line.warn ? '3px solid var(--amber)' : 'none',
                display: 'block',
              }}>
                {line.text}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function FlowDiagram() {
  const [step, setStep] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setStep(s => (s+1)%4), 1800);
    return () => clearInterval(t);
  }, []);
  const steps = [
    { icon:'📧', label:'Inbound RFQ received' },
    { icon:'🔍', label:'Classifying document...' },
    { icon:'⚖️', label:'Reviewing T&C terms...' },
    { icon:'🚩', label:'2 flags raised — review required' },
  ];
  return (
    <div style={{padding:32,width:'100%'}}>
      {steps.map((s,i) => (
        <div key={i} style={{
          display:'flex',alignItems:'center',gap:12,padding:'12px 16px',
          borderRadius:10,marginBottom:8,
          background: i===step ? 'white' : 'rgba(255,255,255,0.5)',
          border: i===step ? '2px solid var(--brand)' : '1px solid rgba(230,51,41,0.1)',
          boxShadow: i===step ? 'var(--shadow-md)' : 'none',
          transition:'all 0.4s',
          opacity: i>step ? 0.4 : 1,
        }}>
          <span style={{fontSize:20}}>{s.icon}</span>
          <span style={{fontSize:13,fontWeight:i===step?700:500,color:i===step?'var(--brand)':'var(--text-dim)'}}>{s.label}</span>
          {i===step && <div style={{marginLeft:'auto',width:16,height:16,border:'2px solid var(--brand)',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>}
          {i<step && <span style={{marginLeft:'auto',color:'var(--green)',fontWeight:700,fontSize:13}}>✓</span>}
        </div>
      ))}
    </div>
  );
}

  const totalValue = '$14.4M';
  const flaggedValue = '$10.4M';
  const atRiskCount = 5;

  return (
    <div className="page">

      <div style={{marginBottom:24}}>

      </div>

      {/* Leadership stat strip */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:24}}>
        {[
          { label:'Total pipeline value', val:totalValue, sub:'9 active opportunities', color:'var(--text)', bg:'white' },
          { label:'Value with open AI flags', val:flaggedValue, sub:`${atRiskCount} opportunities need attention`, color:'var(--red)', bg:'var(--red-bg)' },

            <div style={{fontSize:26,fontWeight:800,letterSpacing:-0.8,color:s.color,marginBottom:3}}>{s.val}</div>

          </div>
        ))}
      </div>

      {/* AI role callout */}
      <div style={{

      }}>
        <span style={{fontSize:15}}>🤖</span>
        <span><strong style={{color:'var(--green)'}}>What the AI does in this view:</strong> Every card below was created automatically when the document arrived — no manual data entry. Flags, values, and blockers were all extracted and assessed by the AI before a salesperson was involved. Your commercial team's job is to resolve the flags and make the calls.</span>
      </div>

      {/* Kanban */}
      <div className="pipeline-grid" style={{alignItems:'start'}}>
        {Object.entries(PIPELINE_RICH).map(([stage, col]) => (

            <div style={{marginBottom:10}}>

                <span style={{fontSize:12,fontWeight:700,color:col.color,textTransform:'uppercase',letterSpacing:'0.05em'}}>{stage}</span>
                <span style={{fontSize:11,fontWeight:700,background:'#F3F4F6',color:'var(--text-secondary)',padding:'2px 8px',borderRadius:20}}>{col.cards.length}</span>
              </div>
              <div style={{fontSize:11,color:'var(--text-muted)',lineHeight:1.4}}>{col.desc}</div>
              <div style={{marginTop:5,fontSize:10,color:col.color,fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
                <span>🤖</span>{col.aiRole}
              </div>
            </div>

            {/* Cards */}
            {col.cards.map((card,i) => {
              const key = `${stage}-${i}`;
              const isExpanded = expanded===key;
              return (
                <div key={i} className="pipeline-card"
                  onClick={()=>setExpanded(isExpanded?null:key)}
                  style={{
                    borderLeft: card.flag==='critical' ? '3px solid var(--red)' :
                                card.flag==='warn' ? '3px solid var(--amber)' :
                                '3px solid var(--green)',
                    cursor:'pointer'
                  }}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
                    <div className="pipeline-card-company" style={{flex:1,marginRight:8}}>{card.company}</div>
                    <span style={{
                      fontSize:12,fontWeight:800,color:
                        card.flag==='critical'?'var(--red)':card.flag==='warn'?'var(--amber)':'var(--green)',
                      flexShrink:0
                    }}>{card.value}</span>
                  </div>
                  <div className="pipeline-card-desc">{card.desc}</div>

                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:8}}>
                    <span className={`pipeline-flag ${card.flag==='critical'?'flag-critical':card.flag==='warn'?'flag-review':'flag-clear'}`}>
                      {card.flagLabel}
                    </span>
                    <span className="pipeline-age">{card.age}</span>
                  </div>

                  {/* Expanded blocker */}
                  {isExpanded && card.blocker && (
                    <div style={{
                      marginTop:10,padding:'10px 12px',
                      background: card.flag==='critical'?'var(--red-bg)':card.flag==='warn'?'var(--amber-bg)':'var(--green-bg)',
                      borderRadius:'var(--radius-sm)',fontSize:12,
                      color:'var(--text-secondary)',lineHeight:1.6,
                      borderTop:'1px solid var(--border)'
                    }}>
                      <div style={{fontWeight:700,marginBottom:3,color:card.flag==='critical'?'var(--red)':card.flag==='warn'?'var(--amber)':'var(--green)'}}>
                        {card.flag==='critical'?'🚨 Blocker':card.flag==='warn'?'⚠️ Action needed':'✅ No blockers'}
                      </div>
                      {card.blocker}
                    </div>
                  )}
                  {isExpanded && !card.blocker && (
                    <div style={{marginTop:10,padding:'10px 12px',background:'var(--green-bg)',borderRadius:'var(--radius-sm)',fontSize:12,color:'var(--green)',fontWeight:600,borderTop:'1px solid var(--border)'}}>
                      ✅ No flags — clear to proceed
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* Footer note */}
      <div style={{marginTop:24,padding:'14px 18px',background:'#F9FAFB',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',fontSize:12,color:'var(--text-secondary)',lineHeight:1.6}}>
        <strong style={{color:'var(--text)'}}>For commercial leadership:</strong> This view gives you a live read on where every opportunity is, what's blocking it, and what the AI has already done. The {atRiskCount} flagged opportunities represent {flaggedValue} in pipeline value that can't move forward until someone makes a call. The AI has done the reading — your team just needs to decide.
      </div>
    </div>
  );
}

const ROLE_QUESTIONS = {
  'Commercial VP': [
    'Which open opportunities have non-standard LD clauses?',
    'What is the total value of flagged deals that can\'t move forward today?',
    'Draft a summary of today\'s pipeline for the leadership meeting',
    'Which opportunity represents the biggest commercial risk right now?',
  ],
  'Sales Manager': [
    'Summarise the Duke Energy RFQ — what do I need to know before responding?',
    'Which documents are clear to process with no flags?',
    'What\'s blocking the NextEra Energy opportunity?',
    'Which deals are closest to quote stage?',
  ],
  'Commercial Lawyer': [
    'List all documents with non-standard liquidated damages clauses',
    'What are the governing law terms across today\'s inbound documents?',
    'Which LD clause deviates most from S&C\'s standard?',
    'Draft a response to Duke Energy flagging the LD clause issue',
  ],
  'Engineering': [
    'Which inbound specs contain non-standard technical requirements?',
    'Is the 63kA fault rating in the NextEra spec within our standard range?',
    'What SCADA protocols have been specified across today\'s documents?',
    'Which documents require an engineering review before quoting?',
  ],
};

const DATA_SOURCES = [
  { icon:'📥', label:'Document Inbox', desc:'3 documents received today, all AI-reviewed' },
  { icon:'📋', label:'Extraction Engine', desc:'127 fields extracted across today\'s documents' },
  { icon:'⚖️', label:'Commercial Baseline', desc:'S&C standard T&C terms and thresholds' },
  { icon:'⚡', label:'Technical Config DB', desc:'S&C preferred product configurations and ratings' },
  { icon:'📊', label:'Pipeline State', desc:'9 active opportunities, $14.4M total value' },
];

function AskAI() {
  const [messages, setMessages] = useState([
    {
      role:'ai',
      text:"I've reviewed all three documents that arrived today and I have the full pipeline in view. The most urgent issue: NextEra Energy's data centre spec has a 1%/week LD clause — double S&C's standard — and a 63kA fault rating that's outside your standard product range. Both need resolution before anyone responds. What would you like to dig into?",
      sources:['Document Inbox','Commercial Baseline']
    }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [history, setHistory] = useState([]);
  const [activeRole, setActiveRole] = useState('Commercial VP');
  const messagesEndRef = useRef(null);

  useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages]);

  const FULL_CONTEXT = AI_SYSTEM + `

Current pipeline context (live data):
INBOUND DOCUMENTS TODAY:
1. Duke Energy Corp — RFQ, 15kV Metal-Clad Switchgear x12 units, ~$2.4M
   - Extracted: 10 fields, delivery 16 weeks ARO, payment Net 60
   - Flags: LD clause 0.5%/week cap 10% (S&C standard: 0.25%/week cap 5%) — CRITICAL. Delivery timeline tight — WARNING.
   - Tech spec: 15kV/1200A/40kA — matches S&C preferred configuration.

2. NextEra Energy — Technical Specification, 38kV Outdoor Switchgear x8 bays, 480MW data centre campus, ~$4.1M
   - Extracted: 10 fields, delivery 20 weeks ARO, 30% advance + 70% on delivery
   - Flags: LD clause 1%/week cap 15% — CRITICAL (2x above standard). 63kA fault rating — CRITICAL (outside standard range, engineering review required). DNP3 SCADA integration — WARNING (adds scope and cost).
   - This is the highest-value and highest-risk document today.

3. Dominion Energy — Purchase Order, Form 4 Recloser x24, $1.02M
   - Extracted: 8 fields. All terms standard. Net 45 payment.
   - Flags: None. Clear to process.

PIPELINE STATE:
- 9 active opportunities, $14.4M total value
- 5 flagged ($10.4M value), 2 clear, 2 won this week ($2.4M)
- Stages: Incoming (3), Under Review (2), Commercial Sign-off (1), Quote Issued (2)
- Blocked: Pacific Gas & Electric (non-standard arc flash rating), AEP Texas (awaiting VP approval on revised LD terms)

WHAT THE AI DOES vs HUMANS:
- AI: reads documents, extracts fields, checks against commercial baseline, raises flags, populates Salesforce, answers questions
- Humans: make all commercial decisions, approve or reject terms, sign off quotes, manage customer relationships
The AI never responds to customers or commits S&C to any terms.`;

  async function send(text) {
    if (!text?.trim() || loading) return;
    const userMsg = { role:'user', text };
    const newHistory = [...history, { role:'user', content:text }];
    setMessages(m => [...m, userMsg]);
    setHistory(newHistory);
    setInput('');
    setLoading(true);

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          system: FULL_CONTEXT,
          messages: newHistory
        })
      });
      const data = await res.json();
      const reply = data.content?.find(b=>b.type==='text')?.text || "I'm having trouble connecting right now.";
      setHistory(h => [...h, { role:'assistant', content:reply }]);
      // Vary sources based on question content
      const src = text.toLowerCase().includes('ld') || text.toLowerCase().includes('clause') || text.toLowerCase().includes('terms')
        ? ['Commercial Baseline','Document Inbox']
        : text.toLowerCase().includes('tech') || text.toLowerCase().includes('spec') || text.toLowerCase().includes('kv') || text.toLowerCase().includes('rating')
        ? ['Technical Config DB','Document Inbox']
        : text.toLowerCase().includes('pipeline') || text.toLowerCase().includes('value') || text.toLowerCase().includes('block')
        ? ['Pipeline State','Document Inbox']
        : ['Document Inbox','Extraction Engine'];
      setMessages(m => [...m, { role:'ai', text:reply, sources:src }]);
    } catch {
      setMessages(m => [...m, { role:'ai', text:"Connection issue — please try again.", sources:[] }]);
    }
    setLoading(false);
  }

  return (
    <div className="page" style={{paddingBottom:0}}>
      <div style={{display:'grid', gridTemplateColumns:'300px 1fr', gap:20, height:'calc(100vh - 120px)'}}>

        {/* LEFT — context panel */}
        <div style={{display:'flex',flexDirection:'column',gap:14,overflowY:'auto'}}>

          {/* What this is */}
          <div style={{background:'white',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'18px 20px',boxShadow:'var(--shadow-sm)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <div style={{width:32,height:32,borderRadius:10,background:'var(--brand)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <svg width="16" height="16" viewBox="0 0 20 20" fill="white"><path d="M10 2L2 7v6l8 5 8-5V7L10 2z"/></svg>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>Commercial Intelligence</div>
                <div style={{fontSize:11,color:'var(--green)',fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
                  <span style={{width:5,height:5,borderRadius:'50%',background:'var(--green)',display:'inline-block',animation:'pulse 2s infinite'}}/>
                  Live · Connected to pipeline
                </div>
              </div>
            </div>
            <p style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.65}}>
              Ask anything about today's documents, outstanding flags, pipeline value, or specific commercial terms. The AI has read every document and has the full pipeline in view.
            </p>
            <div style={{marginTop:10,padding:'8px 12px',background:'var(--amber-bg)',borderRadius:'var(--radius-sm)',fontSize:11,color:'var(--text-secondary)',lineHeight:1.5}}>
              <strong style={{color:'var(--amber)'}}>Human decisions only:</strong> The AI surfaces information and drafts text. It never responds to customers or commits to commercial terms.
            </div>
          </div>

          {/* Data sources */}
          <div style={{background:'white',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'18px 20px',boxShadow:'var(--shadow-sm)'}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',color:'var(--text-muted)',marginBottom:12}}>Connected data sources</div>
            {DATA_SOURCES.map((s,i) => (
              <div key={i} style={{display:'flex',gap:10,alignItems:'flex-start',padding:'7px 0',borderBottom:i<DATA_SOURCES.length-1?'1px solid var(--border)':'none'}}>
                <span style={{fontSize:15,flexShrink:0,marginTop:1}}>{s.icon}</span>
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{s.label}</div>
                  <div style={{fontSize:11,color:'var(--text-muted)',lineHeight:1.4}}>{s.desc}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Role-based questions */}
          <div style={{background:'white',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'18px 20px',boxShadow:'var(--shadow-sm)',flex:1}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',color:'var(--text-muted)',marginBottom:10}}>Questions by role</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:12}}>
              {Object.keys(ROLE_QUESTIONS).map(role => (
                <button key={role} onClick={()=>setActiveRole(role)} style={{
                  padding:'4px 10px',borderRadius:20,border:'1px solid var(--border)',
                  fontSize:11,fontWeight:activeRole===role?700:500,cursor:'pointer',
                  background:activeRole===role?'var(--text)':'white',
                  color:activeRole===role?'white':'var(--text-secondary)',
                  fontFamily:'var(--font)',transition:'all 0.15s'
                }}>{role}</button>
              ))}
            </div>
            {ROLE_QUESTIONS[activeRole].map((q,i) => (
              <button key={i} onClick={()=>send(q)} style={{
                display:'block',width:'100%',textAlign:'left',padding:'8px 10px',
                marginBottom:5,background:'#F9FAFB',border:'1px solid var(--border)',
                borderRadius:'var(--radius-sm)',fontSize:12,color:'var(--text-secondary)',
                cursor:'pointer',fontFamily:'var(--font)',lineHeight:1.5,transition:'all 0.15s'
              }}
              onMouseOver={e=>{e.currentTarget.style.borderColor='var(--brand)';e.currentTarget.style.color='var(--brand)';e.currentTarget.style.background='var(--brand-light)';}}
              onMouseOut={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text-secondary)';e.currentTarget.style.background='#F9FAFB';}}
              >
                {q}
              </button>
            ))}
          </div>
        </div>

        {/* RIGHT — chat */}
        <div className="chat-panel">
          <div className="chat-header">
            <div className="chat-avatar">
              <svg viewBox="0 0 20 20"><path d="M10 2L2 7v6l8 5 8-5V7L10 2z"/></svg>
            </div>
            <div style={{flex:1}}>
              <div className="chat-name">Commercial Intelligence Agent</div>
              <div className="chat-status">Reviewed 3 documents · $14.4M pipeline in view</div>
            </div>
            <div style={{fontSize:11,color:'var(--text-muted)',textAlign:'right',lineHeight:1.4}}>
              <div style={{fontWeight:600,color:'var(--red)'}}>5 flags open</div>
              <div>$10.4M blocked</div>
            </div>
          </div>

          <div className="messages">
            {messages.map((m,i) => (
              <div key={i} className={`msg ${m.role}`} style={{maxWidth:m.role==='user'?'72%':'88%'}}>
                <div className="msg-av">{m.role==='ai'?'AI':'You'}</div>
                <div style={{flex:1}}>
                  <div className={`msg-bubble${m.text.includes('…')?' thinking':''}`} style={{whiteSpace:'pre-wrap'}}>{m.text}</div>
                  {m.sources?.length>0 && (
                    <div className="sources">
                      <span style={{fontSize:10,color:'var(--text-muted)',marginRight:4}}>Sources:</span>
                      {m.sources.map((s,j) => <span key={j} className="source-chip">{s}</span>)}
                    </div>
                  )}
                </div>
              </div>
            ))}
            {loading && (
              <div className="msg ai" style={{maxWidth:'88%'}}>
                <div className="msg-av">AI</div>
                <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',background:'#F3F4F6',borderRadius:12,fontSize:14,color:'var(--text-muted)',fontStyle:'italic'}}>
                  <div style={{width:14,height:14,border:'2px solid var(--text-muted)',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.8s linear infinite',flexShrink:0}}/>
                  Reading pipeline data…
                </div>
              </div>
            )}
            <div ref={messagesEndRef}/>
          </div>

          <div className="chat-input-row">
            <input
              className="chat-input"
              value={input}
              onChange={e=>setInput(e.target.value)}
              onKeyPress={e=>e.key==='Enter'&&send(input)}
              placeholder="Ask about documents, flags, pipeline value, or draft a response…"
              disabled={loading}
            />
            <button className="send-btn" onClick={()=>send(input)} disabled={loading||!input.trim()}>
              {loading ? '…' : 'Send →'}
            </button>
          </div>
        </div>

      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('Overview');
  return (
    <div>
      <Header tab={tab} setTab={setTab}/>
      {tab==='Overview' && <Overview setTab={setTab}/>}
      {tab==='Inbox' && <Inbox/>}
      {tab==='Pipeline' && <Pipeline/>}
      {tab==='Ask AI' && <AskAI/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
