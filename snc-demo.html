:root {

  --card: #FFFFFF;
  --border: rgba(0,0,0,0.07);
  --border-light: rgba(0,0,0,0.04);
  --text: #1D1D1F;
  --text-secondary: #424245;
  --text-dim: #6E6E73;
  --text-muted: #86868B;
  --brand: #E63329;
  --brand-light: rgba(230,51,41,0.08);
  --brand-mid: rgba(230,51,41,0.15);
  --green: #10B981;
  --green-bg: rgba(16,185,129,0.08);
  --amber: #F59E0B;
  --amber-bg: rgba(245,158,11,0.08);
  --red: #EF4444;
  --red-bg: rgba(239,68,68,0.08);
  --blue: #3B82F6;
  --blue-bg: rgba(59,130,246,0.08);
  --purple: #8B5CF6;
  --purple-bg: rgba(139,92,246,0.08);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.06), 0 4px 6px -4px rgba(0,0,0,0.04);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;

}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:var(--font); background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; overflow-x:hidden; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.12); border-radius:10px; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }

.header {
  background:rgba(255,255,255,0.8);
  border-bottom:1px solid var(--border);
  padding:0 40px; height:60px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
  backdrop-filter:blur(20px);
}
.logo { display:flex; align-items:center; gap:10px; }
.logo-mark { width:28px; height:28px; background:var(--brand); border-radius:8px; display:flex; align-items:center; justify-content:center; }
.logo-mark svg { width:16px; height:16px; fill:white; }
.logo-name { font-size:15px; font-weight:700; letter-spacing:-0.3px; }
.logo-div { width:1px; height:18px; background:var(--border); margin:0 12px; }
.logo-product { font-size:13px; font-weight:600; color:var(--brand); }
.header-right { display:flex; align-items:center; gap:10px; }
.nav-tabs { display:flex; background:#F3F4F6; border-radius:10px; padding:3px; gap:2px; }
.nav-tab { padding:6px 16px; border-radius:8px; border:none; background:transparent; color:var(--text-muted); cursor:pointer; font-size:13px; font-weight:500; font-family:var(--font); transition:all 0.2s; white-space:nowrap; }
.nav-tab.active { background:#fff; color:var(--text); box-shadow:var(--shadow-sm); font-weight:600; }
.indicative-badge { display:flex; align-items:center; gap:5px; padding:5px 12px; border-radius:20px; background:var(--amber-bg); font-size:11px; font-weight:600; color:var(--amber); text-transform:uppercase; letter-spacing:0.5px; }

.page { padding:28px 40px; max-width:1320px; margin:0 auto; animation:fadeIn 0.3s ease; }

/* COVER */
.cover-hero { display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center; margin-bottom:48px; }
.cover-eyebrow { font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--brand); margin-bottom:16px; }
.cover-title { font-size:44px; font-weight:800; letter-spacing:-1.5px; line-height:1.08; margin-bottom:16px; }
.cover-title span { color:var(--brand); }
.cover-sub { font-size:16px; color:var(--text-dim); line-height:1.65; margin-bottom:32px; }
.cover-stats { display:flex; gap:32px; }
.stat-val { font-size:30px; font-weight:800; letter-spacing:-1px; color:var(--brand); }
.stat-lbl { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:3px; font-weight:500; }
.cover-visual { width:100%; aspect-ratio:1.3; background:linear-gradient(135deg,#FEF2F2,#FFF5F5,#FEF2F2); border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; box-shadow:var(--shadow-lg); }
.cover-features { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.cover-feature { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow-sm); transition:all 0.3s; }
.cover-feature:hover { box-shadow:var(--shadow-lg); transform:translateY(-3px); }
.feature-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; margin-bottom:14px; }
.feature-title { font-size:14px; font-weight:700; margin-bottom:6px; }
.feature-body { font-size:13px; color:var(--text-dim); line-height:1.6; }

/* INBOX / PIPELINE */
.two-col { display:grid; grid-template-columns:340px 1fr; gap:20px; height:calc(100vh - 140px); }
.panel { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; display:flex; flex-direction:column; box-shadow:var(--shadow-sm); }
.panel-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.panel-title { font-size:13px; font-weight:700; color:var(--text); }
.panel-body { flex:1; overflow-y:auto; }

.inbox-item { padding:14px 18px; border-bottom:1px solid var(--border-light); cursor:pointer; transition:background 0.15s; display:flex; gap:12px; align-items:flex-start; }
.inbox-item:hover { background:#FAFAFA; }
.inbox-item.active { background:var(--brand-light); }
.inbox-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.inbox-meta { flex:1; min-width:0; }
.inbox-from { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.inbox-subject { font-size:12px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.inbox-time { font-size:11px; color:var(--text-muted); margin-top:2px; }
.inbox-badge { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; padding:2px 7px; border-radius:20px; flex-shrink:0; margin-top:2px; }
.badge-new { background:var(--brand-light); color:var(--brand); }
.badge-review { background:var(--amber-bg); color:var(--amber); }
.badge-done { background:var(--green-bg); color:var(--green); }

/* DOCUMENT DETAIL */
.doc-view { display:flex; flex-direction:column; height:100%; }
.doc-header { padding:20px 24px; border-bottom:1px solid var(--border); flex-shrink:0; }
.doc-title { font-size:16px; font-weight:700; margin-bottom:4px; }
.doc-meta { font-size:12px; color:var(--text-muted); }
.doc-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); flex-shrink:0; padding:0 24px; }
.doc-tab { padding:10px 16px; font-size:13px; font-weight:500; color:var(--text-dim); border-bottom:2px solid transparent; cursor:pointer; transition:all 0.15s; }
.doc-tab.active { color:var(--brand); border-bottom-color:var(--brand); font-weight:600; }
.doc-content { flex:1; overflow-y:auto; padding:24px; }

/* EXTRACTION TABLE */
.extract-table { width:100%; border-collapse:collapse; font-size:13px; }
.extract-table th { padding:10px 14px; text-align:left; font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-muted); border-bottom:1px solid var(--border); background:#FAFAFA; }
.extract-table td { padding:12px 14px; border-bottom:1px solid var(--border-light); vertical-align:middle; }
.extract-table tr:last-child td { border-bottom:none; }

.field-name { font-weight:600; color:var(--text); }
.field-val { color:var(--text-secondary); font-family:'Courier New', monospace; font-size:12px; }

.source-link { font-size:11px; color:var(--blue); cursor:pointer; text-decoration:underline; }

/* FLAGS */

.flag-card.green .flag-title { color:var(--green); }
.flag-body { font-size:13px; color:var(--text-secondary); line-height:1.6; }

.chat-wrap { display:flex; flex-direction:column; height:calc(100vh - 140px); gap:20px; }

.chat-name { font-size:14px; font-weight:700; }
.chat-status { font-size:12px; color:var(--green); font-weight:500; display:flex; align-items:center; gap:5px; }
.chat-status::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; animation:pulse 2s infinite; }
.messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
.msg { display:flex; gap:10px; align-items:flex-start; max-width:80%; }
.msg.user { align-self:flex-end; flex-direction:row-reverse; }

.msg.ai .msg-bubble { background:#F3F4F6; color:var(--text); border-bottom-left-radius:3px; }
.msg.user .msg-bubble { background:var(--brand); color:white; border-bottom-right-radius:3px; }

.send-btn:hover { background:#c42b22; }

.pipeline-col { flex:0 0 240px; }
.pipeline-col-header { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-muted); margin-bottom:10px; padding:0 4px; display:flex; align-items:center; justify-content:space-between; }
.pipeline-count { background:#E5E7EB; color:var(--text-secondary); padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.pipeline-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; margin-bottom:8px; box-shadow:var(--shadow-sm); cursor:pointer; transition:all 0.2s; }
.pipeline-card:hover { box-shadow:var(--shadow-md); transform:translateY(-1px); }
.pipeline-card-company { font-size:13px; font-weight:700; margin-bottom:3px; }
.pipeline-card-desc { font-size:12px; color:var(--text-dim); margin-bottom:10px; line-height:1.5; }
.pipeline-card-meta { display:flex; justify-content:space-between; align-items:center; }
.pipeline-flag { font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; }
.flag-critical { background:var(--red-bg); color:var(--red); }
.flag-review { background:var(--amber-bg); color:var(--amber); }
.flag-clear { background:var(--green-bg); color:var(--green); }
.pipeline-age { font-size:11px; color:var(--text-muted); }

.pill { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.pill-brand { background:var(--brand-light); color:var(--brand); }
.pill-green { background:var(--green-bg); color:var(--green); }

.pill-red { background:var(--red-bg); color:var(--red); }

.flow { display:flex; align-items:center; gap:0; overflow-x:auto; padding:24px 0; }
.flow-node { flex-shrink:0; width:140px; text-align:center; }

.flow-icon { font-size:20px; margin-bottom:6px; }

.flow-sub { font-size:10px; color:var(--text-muted); margin-top:3px; line-height:1.3; }
.flow-arrow { font-size:18px; color:var(--text-muted); flex-shrink:0; margin:0 4px; }

.skeleton { background:linear-gradient(90deg,#F0F0F0 25%,#E0E0E0 50%,#F0F0F0 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:4px; }
</style>

function FlowDiagram() {

        }}>

                  {isClean && (

                      <div style={{fontSize:12,fontWeight:700,color:'var(--green)'}}>✅ No exceptions found — clear to process</div>
                    </div>
                  )}
                </div>
              )}

              {/* EXTRACTED FIELDS TAB */}
              {docTab==='Extracted Fields' && (
                <div>
                  <div style={{
                    padding:'10px 14px', background:'#F9FAFB', border:'1px solid var(--border)',
                    borderRadius:'var(--radius-sm)', marginBottom:16, fontSize:12,
                    color:'var(--text-secondary)', lineHeight:1.6
                  }}>
                    <strong style={{color:'var(--text)'}}>How to read this table:</strong> Every field was extracted automatically by the AI from the source document. The confidence score reflects how clearly the value appeared in the text. Click any source reference to see exactly where in the document the AI found it — every extraction is verifiable.
                  </div>
                  <table className="extract-table">
                    <thead>
                      <tr>
                        <th>Field</th>
                        <th>Extracted Value</th>
                        <th>Confidence</th>
                        <th>Source in Document</th>
                      </tr>
                    </thead>
                    <tbody>
                      {selected.extracted.map((row,i) => (
                        <tr key={i} style={{background: row.confidence<88 ? 'rgba(245,158,11,0.03)' : 'transparent'}}>
                          <td><span className="field-name">{row.field}</span></td>
                          <td><span className="field-val">{row.value}</span></td>
                          <td>
                            <span className={`confidence ${row.confidence>=95?'conf-high':row.confidence>=85?'conf-med':'conf-low'}`}>
                              <span className="conf-dot" style={{background:row.confidence>=95?'var(--green)':row.confidence>=85?'var(--amber)':'var(--red)'}}/>
                              {row.confidence}%
                            </span>
                          </td>
                          <td>
                            <span className="source-link" title="Click to verify in source document">{row.source}</span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  <div style={{marginTop:12,fontSize:12,color:'var(--text-muted)',lineHeight:1.6}}>
                    All {selected.extracted.length} fields extracted automatically. No manual data entry. These values are written directly to the Salesforce opportunity record on receipt.
                  </div>
                </div>
              )}

              {/* FLAGS & ACTIONS TAB */}
              {docTab==='Flags & Actions' && (
                <div>
                  <div style={{
                    padding:'10px 14px', background:'#F9FAFB', border:'1px solid var(--border)',
                    borderRadius:'var(--radius-sm)', marginBottom:16, fontSize:12,
                    color:'var(--text-secondary)', lineHeight:1.6
                  }}>
                    <strong style={{color:'var(--text)'}}>How flags work:</strong> The AI compares every extracted clause against S&C's commercial standards baseline and preferred technical configurations. Anything that deviates is flagged here — automatically, before anyone reads the document.
                  </div>

                  {selected.flags.map((flag,i) => (
                    <div key={i} className={`flag-card ${flag.type}`} style={{marginBottom:10}}>
                      <div className="flag-icon">{flag.type==='red'?'🚨':flag.type==='amber'?'⚠️':'✅'}</div>
                      <div style={{flex:1}}>
                        <div className="flag-title">{flag.title}</div>
                        <div className="flag-body">{flag.body}</div>
                        {flag.type==='red' && !escalated[`${selected.id}-${i}`] && (
                          <button onClick={()=>setEscalated(e=>({...e,[`${selected.id}-${i}`]:true}))} style={{
                            marginTop:10,padding:'6px 14px',background:'var(--red)',color:'white',
                            border:'none',borderRadius:'var(--radius-sm)',fontSize:12,fontWeight:600,
                            fontFamily:'var(--font)',cursor:'pointer'
                          }}>Escalate to Commercial Team →</button>
                        )}
                        {escalated[`${selected.id}-${i}`] && (
                          <div style={{marginTop:10,fontSize:12,color:'var(--green)',fontWeight:600}}>✓ Escalated — commercial team notified</div>
                        )}
                      </div>
                    </div>
                  ))}

                  <div style={{marginTop:20,padding:'14px 16px',background:'#F9FAFB',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',fontSize:12,color:'var(--text-secondary)',lineHeight:1.6}}>
                    <strong style={{color:'var(--text)'}}>Human in the loop: </strong>The AI raises the flags. Your commercial team makes the call. No document is actioned without human sign-off — the AI's job is to make sure nothing gets missed and nothing gets rushed without the right people knowing about it.
                  </div>

                  <div style={{marginTop:16,display:'flex',gap:10}}>
                    {!reviewed[selected.id]
                      ? <button onClick={()=>setReviewed(r=>({...r,[selected.id]:true}))} style={{flex:1,padding:'11px 0',background:'var(--text)',color:'white',border:'none',borderRadius:'var(--radius-sm)',fontWeight:600,fontSize:14,fontFamily:'var(--font)',cursor:'pointer'}}>Mark as Reviewed ✓</button>
                      : <div style={{flex:1,padding:'11px 0',background:'var(--green-bg)',border:'1px solid rgba(16,185,129,0.2)',borderRadius:'var(--radius-sm)',fontWeight:600,fontSize:14,color:'var(--green)',textAlign:'center'}}>✓ Reviewed — logged with timestamp</div>
                    }
                  </div>
                </div>
              )}

            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Pipeline() {
  return (
    <div className="page">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,letterSpacing:-0.5}}>Quote Pipeline</div>
          <div style={{fontSize:13,color:'var(--text-muted)',marginTop:3}}>All inbound commercial documents · updated in real time</div>
        </div>
        <div style={{display:'flex',gap:24,fontSize:13}}>
          <div><span style={{fontWeight:700,fontSize:20,color:'var(--brand)'}}>9</span> <span style={{color:'var(--text-muted)'}}>Active</span></div>
          <div><span style={{fontWeight:700,fontSize:20,color:'var(--red)'}}>5</span> <span style={{color:'var(--text-muted)'}}>Flagged</span></div>
          <div><span style={{fontWeight:700,fontSize:20,color:'var(--green)'}}>2</span> <span style={{color:'var(--text-muted)'}}>Won this week</span></div>
        </div>
      </div>
      <div className="pipeline-grid">
        {Object.entries(PIPELINE_DATA).map(([stage, cards]) => (
          <div key={stage} className="pipeline-col">
            <div className="pipeline-col-header">
              {stage}
              <span className="pipeline-count">{cards.length}</span>
            </div>
            {cards.map((card,i) => (
              <div key={i} className="pipeline-card">
                <div className="pipeline-card-company">{card.company}</div>
                <div className="pipeline-card-desc">{card.desc}</div>
                <div className="pipeline-card-meta">
                  <span className={`pipeline-flag ${card.flag}`}>{card.flagLabel}</span>
                  <span className="pipeline-age">{card.age}</span>
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

function AskAI() {
  const [messages, setMessages] = useState([
    { role:'ai', text:"I have access to all inbound documents, extracted data, and commercial flags across the current pipeline. Ask me about any document, flag, or trend you're seeing.", sources:[] }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [history, setHistory] = useState([]);
  const messagesEndRef = useRef(null);

  const CHIPS = [
    'Summarise today\'s incoming documents',
    'Which documents have non-standard LD clauses?',
    'What technical flags are outstanding?',
    'What\'s the highest value opportunity in the pipeline?',
  ];

  useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages]);

  async function send(text) {
    if (!text?.trim() || loading) return;
    const userMsg = { role:'user', text };
    const newHistory = [...history, { role:'user', content:text }];
    setMessages(m => [...m, userMsg]);
    setHistory(newHistory);
    setInput('');
    setLoading(true);

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          system: AI_SYSTEM + `\n\nCurrent pipeline context:\n- 3 inbound documents today\n- Duke Energy: 15kV switchgear x12, 2 flags (non-standard LD at 0.5%/week, tight 16-week delivery)\n- NextEra Energy: 38kV outdoor switchgear x8 bays for data centre, 3 flags (1%/week LD, 63kA non-standard, DNP3 SCADA)\n- Dominion Energy: Recloser x24, PO accepted, clear\n- Pipeline: 9 active opportunities, 5 flagged, 2 won this week`,
          messages: newHistory
        })
      });
      const data = await res.json();
      const reply = data.content?.find(b=>b.type==='text')?.text || "I'm having trouble connecting right now.";
      setHistory(h => [...h, { role:'assistant', content:reply }]);
      setMessages(m => [...m, { role:'ai', text:reply, sources:['Document Inbox','Extraction Engine','Commercial Baseline'] }]);
    } catch {
      setMessages(m => [...m, { role:'ai', text:"Connection issue — please try again.", sources:[] }]);
    }
    setLoading(false);
  }

  return (
    <div className="page" style={{paddingBottom:0}}>
      <div className="chat-wrap">
        <div className="chat-panel">
          <div className="chat-header">
            <div className="chat-avatar">
              <svg viewBox="0 0 20 20"><path d="M10 2L2 7v6l8 5 8-5V7L10 2z"/></svg>
            </div>
            <div>
              <div className="chat-name">S&amp;C Commercial AI</div>
              <div className="chat-status">Connected to pipeline</div>
            </div>
          </div>
          <div className="messages">
            {messages.map((m,i) => (
              <div key={i} className={`msg ${m.role}`} style={{maxWidth:m.role==='user'?'70%':'85%'}}>
                <div className="msg-av">{m.role==='ai'?'AI':'You'}</div>
                <div>
                  <div className={`msg-bubble${m.text.includes('…')?' thinking':''}`}>{m.text}</div>
                  {m.sources?.length>0 && (
                    <div className="sources">
                      {m.sources.map((s,j) => <span key={j} className="source-chip">{s}</span>)}
                    </div>
                  )}
                </div>
              </div>
            ))}
            {loading && (
              <div className="msg ai">
                <div className="msg-av">AI</div>
                <div className="msg-bubble thinking">Reviewing pipeline data…</div>
              </div>
            )}
            <div ref={messagesEndRef}/>
          </div>
          <div className="chips">
            {CHIPS.map((c,i) => (
              <button key={i} className="chip" onClick={()=>send(c)}>{c}</button>
            ))}
          </div>
          <div className="chat-input-row">
            <input
              className="chat-input"
              value={input}
              onChange={e=>setInput(e.target.value)}
              onKeyPress={e=>e.key==='Enter'&&send(input)}
              placeholder="Ask about any document, flag, or pipeline question…"
              disabled={loading}
            />
            <button className="send-btn" onClick={()=>send(input)} disabled={loading||!input.trim()}>
              {loading ? '…' : 'Send'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('Overview');
  return (
    <div>
      <Header tab={tab} setTab={setTab}/>
      {tab==='Overview' && <Overview setTab={setTab}/>}
      {tab==='Inbox' && <Inbox/>}
      {tab==='Pipeline' && <Pipeline/>}
      {tab==='Ask AI' && <AskAI/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
